name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install project into a venv (dev extras, from lockfile)
        # Not --system: the runner's system Python is externally managed (PEP 668).
        # uv sync creates a project venv and installs the locked deps (uv.lock),
        # so CI is reproducible; `uv run` then executes tools inside that venv.
        run: uv sync --extra dev

      - name: Secret scan (no committed keys)
        run: bash scripts/check_secrets.sh

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Test (unit; live sandbox suite excluded)
        run: uv run pytest -m "not live" -q

  docker:
    runs-on: ubuntu-latest
    needs: lint-and-test
    permissions:
      contents: read
      packages: write    # to publish to GHCR on tags
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (load locally for scanning)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          provenance: false
          tags: momo-mcp-server:ci

      - name: Fail build if secrets are baked into the image
        run: |
          set -euo pipefail
          # The real risk is an accidental `COPY .env` (or a key embedded in a
          # config/text file) — NOT bare 32-hex runs, which appear all over
          # compiled extensions (cryptography, pydantic_core) as LLVM symbol
          # hashes and would false-positive forever. So we check two precise
          # things:
          #   1) No .env file exists anywhere in the image filesystem.
          #   2) No MOMO_*_KEY / MOMO_API_* assignment with a real value appears
          #      in a TEXT file in the image (binaries are excluded).
          cid=$(docker create momo-mcp-server:ci)
          rootfs=/tmp/rootfs
          mkdir -p "$rootfs"
          docker export "$cid" | tar -C "$rootfs" -xf - || true
          docker rm "$cid" >/dev/null

          if find "$rootfs" -name '.env' -type f | grep -q .; then
            echo "FAIL: a .env file is present in the image filesystem." >&2
            exit 1
          fi

          # Grep only text files for a real key assignment (value, not blank,
          # not an f-string placeholder).
          if grep -rIlE '(MOMO_[A-Z_]*KEY|MOMO_API_(USER|KEY))=[^[:space:]{"'"'"']+' \
               "$rootfs" 2>/dev/null | grep -q .; then
            echo "FAIL: a MOMO_* credential assignment is baked into the image." >&2
            exit 1
          fi
          echo "OK: no .env and no baked credentials in the image."

      - name: Install Trivy (Aqua's official apt repository)
        # The wrapper action and the install.sh script both failed on this runner
        # (exit 1 right after version detection). Installing from Aqua's official
        # Debian repo via apt is the most robust path on ubuntu-latest: no nested
        # actions, no release-asset name guessing, no privileged-path writes under
        # `set -e`.
        run: |
          set -euxo pipefail
          sudo apt-get install -y wget gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key \
            | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" \
            | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy
          trivy --version

      - name: Trivy vulnerability scan (fail on HIGH/CRITICAL)
        run: |
          trivy image \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 1 \
            --no-progress \
            momo-mcp-server:ci

      - name: Generate SBOM (syft)
        uses: anchore/sbom-action@v0.24.0
        with:
          image: momo-mcp-server:ci
          artifact-name: sbom.spdx.json

      # Publish to GHCR only on semver tags (e.g. v0.1.0).
      - name: Log in to GHCR
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push tagged release to GHCR
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          provenance: false
          tags: |
            ghcr.io/samuelizabayo/momo-mcp-server:latest
            ghcr.io/samuelizabayo/momo-mcp-server:${{ github.ref_name }}
